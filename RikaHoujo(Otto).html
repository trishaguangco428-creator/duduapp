<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTTO</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('sky.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            position: relative;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 320px;
            animation: fadeIn 1s ease-in-out;
            overflow: visible;
        }

        .sticker {
            position: absolute;
            top: -15px;
            right: -25px;
            width: 65px;
            height: 65px;
            background-image: url('sky.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.8), 0 4px 8px rgba(106, 95, 95, 0.3);
            border: 2px solid white;
            transition: transform 0.3s ease;
        }

        .sticker:hover {
            transform: scale(1.1) rotate(2deg);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box h2 {
            margin-bottom: 1.5rem;
            text-align: center;
            color: #ff6b81;
            font-size: 1.8rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            transition: border 0.3s ease;
        }

        input:focus {
            border-color: #ff6b81;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff6b81;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #ff3e61;
        }

        #message {
            text-align: center;
            margin-top: 12px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="sticker"></div> <!-- Sky sticker in top corner -->
        <h2>Login</h2>
        <form onsubmit="return loginUser(event)">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p id="message"></p>
    </div>

    <script>
        function loginUser(event) {
            event.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const message = document.getElementById("message");

            const validUsername = "OTTO123";
            const validPassword = "LoveRika123";

            if (username === validUsername && password === validPassword) {
                message.style.color = "green";
                message.textContent = "Login successful!";
                window.location.href = "birthday.html"; // Redirect to your birthday page
            } else {
                message.style.color = "red";
                message.textContent = "Invalid username or password.";
            }
        }
    </script>
</body>
</html>
